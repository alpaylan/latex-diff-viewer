# Copy this to .github/workflows/latex-diff.yml in your LaTeX project.
#
# Prereqs:
#   * A difftool.toml in the repo root (see difftool.example.toml). Minimal:
#         main = "main.tex"
#         build_command = "latexmk -pdf -f -interaction=nonstopmode main.tex"
#   * Settings -> Pages -> Source = "GitHub Actions" (for the Pages job).
#
# On every PR it posts a comment + uploads the diff/full PDFs.
# On every push to main it (re)publishes the browsable Pages viewer.
# You can also trigger it by hand (Actions -> LaTeX diff -> Run workflow) and
# optionally type the two commits to compare.

name: LaTeX diff

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base:
        description: "Base ref to diff FROM (blank = the head commit's parent)"
        required: false
        default: ""
      head:
        description: "Compare ref to diff TO (blank = latest commit)"
        required: false
        default: ""

jobs:
  # ---- PR check / manual run: build base..head diff, comment + artifact ------
  diff:
    if: github.event_name != 'push'      # runs on pull_request and workflow_dispatch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write               # so the action can post its comment on PRs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                  # git-latexdiff needs both commits' history
      - uses: alpaylan/latex-diff-viewer@v1
        with:
          config: difftool.toml
          # On a manual run these come from the form; on a PR they're empty and
          # the action falls back to the PR's base/head automatically.
          base: ${{ inputs.base }}
          head: ${{ inputs.head }}

  # ---- main: publish the static Pages viewer --------------------------------
  pages:
    if: github.event_name == 'push'
    uses: alpaylan/latex-diff-viewer/.github/workflows/pages.yml@v1
    permissions:
      contents: read
      pages: write
      id-token: write
    with:
      config: difftool.toml
      # pages_pairs: "HEAD~5..HEAD"       # override which diffs to pre-build
