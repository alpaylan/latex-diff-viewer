name: Self-test

# Build the image and exercise the CLI against a tiny two-commit LaTeX repo, so
# regressions in the build core / CLI / Docker packaging are caught on every push.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ldv:test .

      - name: Prepare a two-commit sample repo
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/sample"
          cp -r tests/sample-project "$work"
          cd "$work"
          git init -q
          git -c user.email=a@b.c -c user.name=test add -A
          git -c user.email=a@b.c -c user.name=test commit -qm "v1"
          python3 - <<'PY'
          import pathlib
          p = pathlib.Path("main.tex"); t = p.read_text()
          t = t.replace("version one", "version two")
          t = t.replace("% EXTRA",
                        "\\section{Results}\nA newly added section so the diff spans pages.")
          p.write_text(t)
          PY
          git -c user.email=a@b.c -c user.name=test commit -qam "v2"

      - name: build-diff
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/sample"
          docker run --rm -v "$work:/w" -w /w ldv:test \
            build-diff --old HEAD~1 --new HEAD -o /w/out/diff.pdf | tee "$RUNNER_TEMP/diff.json"
          test -s "$work/out/diff.pdf"
          # ok AND a non-empty changed-pages index: pre-v1.1.11 the added \section
          # made the build fail (empty diff), so assert both, not just ok.
          python3 -c 'import json;d=json.load(open("'"$RUNNER_TEMP"'/diff.json"));assert d["ok"], d;assert d["changed_pages"]>0, d'
          echo "diff OK"

      - name: build-full
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/sample"
          docker run --rm -v "$work:/w" -w /w ldv:test \
            build-full --commit HEAD -o /w/out/full.pdf
          test -s "$work/out/full.pdf"
          echo "full OK"

      - name: pages
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/sample"
          docker run --rm -v "$work:/w" -w /w ldv:test pages -o /w/site
          test -s "$work/site/manifest.json"
          test -s "$work/site/index.html"
          python3 -c 'import json;m=json.load(open("'"$work"'/site/manifest.json"));assert m["diffs"], m'
          echo "pages OK"

      # The gitless personal flow: save -> edit -> save -> diff s1 s2.
      - name: personal save/diff flow
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/sample"
          state="$RUNNER_TEMP/ldv-state"; mkdir -p "$state"
          run() { docker run --rm -e XDG_STATE_HOME=/state \
                    -v "$work:/w" -v "$state:/state" -w /w ldv:test "$@"; }
          run save -m "first" | tee "$RUNNER_TEMP/s1.json"
          python3 -c 'import json;d=json.load(open("'"$RUNNER_TEMP"'/s1.json"));assert d["ok"] and d["id"]=="s1", d'
          sed -i 's/version two/version three/' "$work/main.tex"
          run save -m "second"
          run diff s1 s2 -o /w/out/save-diff.pdf | tee "$RUNNER_TEMP/sd.json"
          python3 -c 'import json;d=json.load(open("'"$RUNNER_TEMP"'/sd.json"));assert d["ok"], d;assert d["changed_pages"]>0, d'
          test -s "$work/out/save-diff.pdf"
          echo "personal flow OK"

      # The Overleaf read-link flow against the grant-interstitial mock —
      # save/pull need no TeX, so this runs on the bare runner.
      - name: overleaf read-link flow (mock)
        run: |
          set -euo pipefail
          export XDG_STATE_HOME="$RUNNER_TEMP/ol-state" PYTHONPATH=src
          python3 tests/mock_overleaf.py 8973 "version A" & MOCK=$!
          sleep 1
          # No folder involved: link registers the project under its title.
          python3 -m latexdiff_viewer.cli link \
            "http://127.0.0.1:8973/read/tok#ccbb9b" | tee "$RUNNER_TEMP/l1.json"
          python3 -c 'import json;d=json.load(open("'"$RUNNER_TEMP"'/l1.json"));assert d["ok"] and d["id"]=="s1" and d["project"]=="Mock_Paper", d'
          kill $MOCK; wait $MOCK 2>/dev/null || true
          python3 tests/mock_overleaf.py 8973 "version B" & MOCK=$!
          sleep 1
          python3 -m latexdiff_viewer.cli pull --project Mock_Paper | tee "$RUNNER_TEMP/l2.json"
          python3 -c 'import json;d=json.load(open("'"$RUNNER_TEMP"'/l2.json"));assert d["ok"] and d["id"]=="s2" and not d.get("unchanged"), d'
          kill $MOCK 2>/dev/null || true
          echo "overleaf mock OK"
